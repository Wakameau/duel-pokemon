<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duel de Base</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="homeScreen" class="screen active">
      <div class="panel home-panel">
        <h1>Duel de Base</h1>
        <p class="subtitle">Pokémon en salon</p>

        <input id="playerName" type="text" maxlength="20" placeholder="Ton pseudo" />

        <div class="setup-box">
          <label for="gameModeSelect">Mode de jeu</label>
          <select id="gameModeSelect">
            <option value="1v1">1v1</option>
            <option value="2v2">2v2</option>
            <option value="ffa">FFA</option>
          </select>
        </div>

        <div class="setup-box">
          <label>Générations</label>

          <div class="gen-actions">
            <button type="button" id="selectAllGensBtn">Toutes</button>
            <button type="button" id="clearAllGensBtn">Aucune</button>
          </div>

          <div class="gen-button-list">
            <button type="button" class="gen-toggle active" data-gen="1">GEN 1</button>
            <button type="button" class="gen-toggle active" data-gen="2">GEN 2</button>
            <button type="button" class="gen-toggle active" data-gen="3">GEN 3</button>
            <button type="button" class="gen-toggle active" data-gen="4">GEN 4</button>
            <button type="button" class="gen-toggle active" data-gen="5">GEN 5</button>
            <button type="button" class="gen-toggle active" data-gen="6">GEN 6</button>
            <button type="button" class="gen-toggle active" data-gen="7">GEN 7</button>
            <button type="button" class="gen-toggle active" data-gen="8">GEN 8</button>
            <button type="button" class="gen-toggle active" data-gen="9">GEN 9</button>
          </div>
        </div>

        <div class="home-actions">
          <button id="createRoomBtn">Créer un salon</button>
        </div>

        <div class="join-box">
          <input id="roomCodeInput" type="text" maxlength="5" placeholder="Code salon" />
          <button id="joinRoomBtn">Rejoindre</button>
        </div>

        <p id="homeMessage" class="message"></p>
      </div>
    </div>

    <div id="roomScreen" class="screen">
      <div id="duelOverlay" class="duel-overlay hidden">
        <div class="duel-side duel-left">
          <div id="duelLeftName" class="duel-name">Joueur A</div>
          <div id="duelLeftScore" class="duel-score duel-score-left">0</div>
        </div>

        <div class="duel-center">
          <div class="duel-vs">VS</div>
        </div>

        <div class="duel-side duel-right">
          <div id="duelRightName" class="duel-name">Joueur B</div>
          <div id="duelRightScore" class="duel-score duel-score-right">0</div>
        </div>
      </div>

      <div class="match-topbar">
        <div class="room-code-box">
          <strong>Salon :</strong>
          <span id="roomCodeDisplay">-</span>
          <button id="copyCodeBtn" type="button">📋</button>
        </div>

        <div class="topbar-right">
          <div id="roomModeDisplay">Mode : 1v1</div>
          <div id="roomGensDisplay">Gen : Toutes</div>
          <div id="roomStatus">En attente...</div>
        </div>
      </div>

      <div class="battle-layout">
        <div class="battle-side" id="leftSide">
          <div id="teamAPlayers" class="team-players"></div>
          <div class="side-footer">Veuillez choisir l'une des statistiques ci-dessous</div>
        </div>

        <div class="battle-center">
          <div id="roundLabel" class="round-big">Tour 1</div>
          <div id="suddenDeathLabel" class="badge hidden">MORT SUBITE</div>

          <div class="pokemon-box battle-pokemon-box">
            <img id="pokemonSprite" src="" alt="pokemon" />
            <h2 id="pokemonName">En attente...</h2>
            <div class="vs-text">VS</div>
            <div id="centerSubText" class="waiting-text">En attente</div>
          </div>

          <div id="revealZone" class="reveal-zone"></div>

          <div class="controls">
            <button id="startGameBtn">Lancer la partie</button>
            <button id="restartGameBtn" class="hidden">Rejouer</button>
          </div>
        </div>

        <div class="battle-side" id="rightSide">
          <div id="teamBPlayers" class="team-players"></div>
          <div class="side-footer">Résumé des stats choisies par votre adversaire</div>
        </div>
      </div>

      <div id="ffaLayout" class="hidden">
        <div id="playersGrid" class="players-grid"></div>
      </div>

      <div id="gameMessage" class="message center-message"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
